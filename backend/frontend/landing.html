<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobHunt++ | Your Career's New Best Friend</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* === YOUR EXISTING CSS (UNCHANGED) === */
body{font-family:'Inter',sans-serif;background:#050505;color:#fff;scroll-behavior:smooth}
.heading-font{font-family:'Plus Jakarta Sans',sans-serif}
.premium-button{background:linear-gradient(135deg,#4f46e5,#7c3aed);transition:.3s}
.premium-button:disabled{opacity:.7;background:#333;cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
.shake-element{animation:shake .5s both;border-color:#ef4444!important}
</style>
</head>

<body class="overflow-x-hidden">

<!-- ============================= -->
<!-- PAYMENT CANCELLED BANNER -->
<!-- ============================= -->
<div id="payment-banner" style="display:none;position:fixed;top:0;width:100%;background:#ef4444;color:white;text-align:center;padding:12px;font-weight:600;z-index:9999">
❌ Payment cancelled. No charges were made. Please try again below.
</div>

<!-- ============================= -->
<!-- NAVBAR -->
<!-- ============================= -->
<nav class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center bg-[#050505]/90">
<div class="text-2xl font-extrabold heading-font">JobHunt++</div>
<button onclick="handlePaymentClick()" class="premium-button text-white px-5 py-2 rounded-full font-bold text-sm">
Unlock Access
</button>
</nav>

<!-- ============================= -->
<!-- CTA SECTION -->
<!-- ============================= -->
<footer id="unlock-section" class="py-40 px-6 text-center bg-[#080808]">

<h2 class="text-4xl font-bold mb-10">Unlock Lifetime Access</h2>

<button id="cta-pay-button"
onclick="handlePaymentClick()"
class="premium-button px-16 py-6 rounded-2xl text-2xl font-black mb-6">
Unlock Lifetime Access Now
</button>

<div class="max-w-md mx-auto space-y-4">
<input type="email" id="user-email" placeholder="Enter your email"
class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-4 text-white text-lg text-center">
</div>

</footer>

<!-- ============================= -->
<!-- SCRIPT SECTION -->
<!-- ============================= -->
<script>

lucide.createIcons();

/* ================================
GLOBAL STATE
================================ */
let userCountry = "IN";

/* ================================
COUNTRY DETECTION
================================ */
async function detectUserCountry(){
    try{
        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();
        if(data.country_code) userCountry = data.country_code;
    }catch{}
}
detectUserCountry();

/* ================================
HELPERS
================================ */
function scrollToEmailSection(){
    document.getElementById("unlock-section")
        .scrollIntoView({behavior:"smooth",block:"start"});
}

function setButtonLoading(state){
    const btn=document.getElementById("cta-pay-button");
    if(!btn) return;
    if(state){
        btn.disabled=true;
        btn.dataset.txt=btn.innerHTML;
        btn.innerHTML="Processing...";
    }else{
        btn.disabled=false;
        btn.innerHTML=btn.dataset.txt;
    }
}

function validateEmail(){
    const input=document.getElementById("user-email");
    const val=input.value.trim();
    const regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(!val||!regex.test(val)){
        scrollToEmailSection();
        setTimeout(()=>{
            input.focus();
            input.classList.add("shake-element");
            setTimeout(()=>input.classList.remove("shake-element"),600);
        },400);
        return null;
    }
    return val;
}

/* ================================
PAYPAL PAYMENT
================================ */
async function handlePaypalPayment(){

    const email=validateEmail();
    if(!email) return;

    setButtonLoading(true);

    try{
        const res=await fetch(`/payments/paypal/create-order?email=${encodeURIComponent(email)}`,{method:"POST"});
        const data=await res.json();

        localStorage.setItem("payment_email",email);
        window.location.href=data.approval_url;

    }catch{
        alert("PayPal failed.");
        setButtonLoading(false);
    }
}

/* ================================
MAIN PAYMENT FLOW
================================ */
async function handlePaymentClick(){

    const email=validateEmail();
    if(!email) return;

    setButtonLoading(true);

    /* NON INDIA → PAYPAL FIRST */
    if(userCountry!=="IN"){
        handlePaypalPayment();
        return;
    }

    /* INDIA → RAZORPAY FIRST */
    try{

        const res=await fetch(`/payments/razorpay/create-order?amount=4900&email=${encodeURIComponent(email)}`,{method:"POST"});
        const data=await res.json();

        const options={
            key:data.key,
            amount:data.amount,
            currency:data.currency,
            order_id:data.order_id,

            handler:async function(resp){
                const verify=await fetch("/payments/razorpay/verify-payment",{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({...resp,email})
                });

                const verifyData=await verify.json();
                if(verifyData.success) window.location.href=verifyData.redirect_url;
                else{
                    alert("Verification failed");
                    setButtonLoading(false);
                }
            },

            modal:{ondismiss:()=>setButtonLoading(false)}
        };

        new Razorpay(options).open();

    }catch{

        /* AUTO FALLBACK → PAYPAL */
        handlePaypalPayment();
    }
}

/* ================================
CANCELLED PAYMENT BANNER
================================ */
(function(){
const params=new URLSearchParams(window.location.search);
if(params.get("status")==="cancelled"){
document.getElementById("payment-banner").style.display="block";
setTimeout(scrollToEmailSection,500);
}
})();
</script>

</body>
</html>
